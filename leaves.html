










<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <script language="javascript" src="../../resources/js/jquery.js" type="text/javascript"></script>    
        <link type="text/css" href="../../resources/css/jquery-ui.css" rel="stylesheet"/>       
        <link type="text/css" href="../../resources/css/bootstrap.min.css" rel="stylesheet"/>
        <link type="text/css" href="../../resources/css/studentstyle.css" rel="stylesheet"/>
        <script type="text/javascript" src="../../resources/js/jquery-ui.js"></script>
        <script type="text/javascript" src="../../resources/js/stripes.js" ></script>
        <script language="javascript" src="../../resources/js/CalendarControl.js" type="text/javascript"></script>
        <link href="../../resources/css/CalendarControl.css" rel="stylesheet" type="text/css">
        <script type="text/javascript" src='../../resources/js/FieldValidationFrequent.js'></script>
        <script>
            $(document).ready(function () {
                stripeTables("tblLeaveApplication", "dynaColorTR1", "dynaColorTR2");
            });
            currentDate = "2026-07-16";
            currentDateToDisplay = "16-07-2026";
            function showCalendarFromDate() {
                var argTextObject = document.getElementById('txtFromDate');
                var argHiddenObject = document.getElementById('hdnFromDate');
                showCalendarControl(argTextObject, 250, true, 30, currentDate, argHiddenObject);
                document.getElementById('txtToDate').value = argTextObject.value;
                document.getElementById('hdnToDate').value = argHiddenObject.value;
                calculateDateDiff();
            }
            function getPreviousDateDifference(argCurrentDate, argPreviousDateValue) {
                var re = /-/g;
                //argCurrentDate=argCurrentDate.replace(re,'/');
                //argPreviousDateValue=argPreviousDateValue.replace(re,'/');
                var datediff = DateDiff(argPreviousDateValue, argCurrentDate);
                return datediff;
            }
            function showCalendarToDate() {
                var argTextObject = document.getElementById('txtToDate');
                var argHiddenObject = document.getElementById('hdnToDate');
                var datediff = getPreviousDateDifference(currentDate, document.getElementById('hdnFromDate').value);
                /* **********************************************************
                 *    Argument List for showCalendarControl(
                 *       textField     : Text Field Object (Not NAME or ID)
                 *       argPreviousDay: 0 - Previous Date Not allowed, Any Positive Integer - No. of Previous days to allow
                 *       argCurrentDay : true - allow Current date , false - current date is not allowed
                 *       argFutureDay  : 0 - Future Date Not allowed, Any Positive Integer - No. of Future days to allow
                 *       currentDate   : currentdate from server to be passed in format 'yyyy-mm-dd'
                 * */
                showCalendarControl(argTextObject, datediff, true, 250, currentDate, argHiddenObject);
                calculateDateDiff();
            }
            function calculateDateDiff() {
                var fDate = $.trim($("#hdnFromDate").val());
                var tDate = $.trim($("#hdnToDate").val());
                var d1 = new Date(fDate);
                var d2 = new Date(tDate);
                var d3 = ((d2 - d1) / 86400000) + 1;
                $('#txtnoofDays').val(d3);
            }

            function funPrint() {
                $("#hdnLeaveType").val($("#optLeaveType option:selected").text());
                win = window.open('', 'TheWindow', 'Student Leave Application', "location = no,toolbar=no,location=no,directories=no,status=no,menubar=no,,width=900,height=500,scrollbars=yes,status=0");
                document.getElementById('StudentLeaveApplicatiom').submit();
            }
        </script>
    </head>
    <body>
        <form id="StudentLeaveApplicatiom" method="post" action="../../students/report/printLeaveApplication.jsp" target="TheWindow">
            <table width="100%" cellpadding="5" cellspacing="0" class="ui-corner-all table table-bordered" id="tblLeaveApplication">
                <tr class="header">
                    <td colspan="3" style="height:25px;">APPLICATION FOR LEAVE</td>
                </tr>
                <tr>
                    <td align="left" width="25%" style="vertical-align: middle;">Leave Type</td>
                    <td align="left" style="vertical-align: middle">
                        <select id="optLeaveType" style="width: 20%;">
                            <option value="1" selected>CL</option>
                            <option value="2">ML</option>
                            <option value="3">OD</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>Leave From </td>
                    <td><input type="text" id="txtFromDate" name="txtFromDate" maxlength="10" value="16-07-2026" style="width: 15%" readonly onclick="showCalendarFromDate()" onfocus="showCalendarFromDate()" onchange="calculateDateDiff()"><img alt="cal" src="../../resources/Image/calendar.gif" align="top" height="23" style="cursor:pointer" onclick="showCalendarFromDate()"><input type="hidden" id="hdnFromDate" value="2026-07-16"></td>
                </tr>
                <tr>
                    <td>Leave To </td>
                    <td><input type="text" id="txtToDate" name="txtToDate" maxlength="10" value="16-07-2026" readonly style="width: 15%" onclick="showCalendarToDate()" onfocus="showCalendarToDate()" onchange="calculateDateDiff()"><img alt="cal" src="../../resources/Image/calendar.gif" align="top" height="23" style="cursor:pointer" onclick="showCalendarToDate()"><input type="hidden" id="hdnToDate" value="2026-07-16"></td>
                </tr>
                <tr>
                    <td>No. of Days</td>
                    <td><input type="text" id="txtnoofDays" name="txtnoofDays" maxlength="5" value="1" ></td>
                </tr>
                <tr>
                    <td>Reason</td>
                    <td><textarea id="txtReason" name="txtReason"></textarea></td>
                </tr>
                <tr>
                    <td>What assessment / assignment <br>will take / took place during your absence.</td>
                    <td><textarea id="txtAssigment" name="txtAssigment"></textarea></td>
                </tr>
                <tr>
                    <td colspan="3" align="center">
                        <input type="button" id="cmdGenChallan" value="Print" class="button button3" onclick="funPrint()">
                    </td>
                </tr>
                <div id="divPrint" style="display:none;"></div>
            </table>
            <input type="hidden" name="hdnLeaveType" id="hdnLeaveType" value="" />   

        </form> 
    </body>
</html>
